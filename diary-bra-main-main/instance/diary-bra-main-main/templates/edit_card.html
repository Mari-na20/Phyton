<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Editar anotação</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="page-center">

    <div class="edit-card">

        <h1 class="edit-title">Editar anotação</h1>

        <form action="/update/{{ card.id }}" method="POST" class="edit-form">

            <input 
                type="text" 
                name="title" 
                value="{{ card.title }}" 
                placeholder="Título"
                required>

            <input 
                type="text" 
                name="subtitle" 
                value="{{ card.subtitle }}" 
                placeholder="Subtítulo"
                required>

            <textarea 
                name="text" 
                placeholder="Escreva sua anotação..."
                required>{{ card.text }}</textarea>

            <button type="submit">Salvar alterações</button>

        </form>

    </div>

</div>

</body>
</html>
